<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOL Events Management</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1300px;
margin:auto;
}

.back-link{
display:inline-block;
margin-bottom:20px;
text-decoration:none;
color:#111;
font-weight:bold;
}

.card{
background:white;
padding:25px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

h2{
margin-bottom:20px;
}

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.full-width{
grid-column:1/-1;
}

input,
textarea,
select{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:8px;
font-size:14px;
}

textarea{
height:120px;
resize:vertical;
}

.button-group{
display:flex;
gap:10px;
margin-top:15px;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.save-btn{
background:#111;
color:white;
}

.clear-btn{
background:#e5e5e5;
}

.edit-btn{
background:#2563eb;
color:white;
}

.delete-btn{
background:#dc2626;
color:white;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th{
background:#111;
color:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:left;
}

.event-image{
width:80px;
height:50px;
object-fit:cover;
border-radius:5px;
}

.actions{
display:flex;
gap:5px;
}

.search-box{
margin-bottom:15px;
}

.status{
padding:6px 12px;
border-radius:20px;
font-size:12px;
font-weight:bold;
display:inline-block;
}

.upcoming{
background:#dcfce7;
color:#166534;
}

.ended{
background:#fee2e2;
color:#991b1b;
}

@media(max-width:900px){
.form-grid{
grid-template-columns:1fr;
}

table{
display:block;
overflow-x:auto;
white-space:nowrap;
}
}

</style>
</head>

<body>

<div class="container">

<a href="index.html" class="back-link">← Back To Dashboard</a>

<div class="card">
<h2>Event Management</h2>

<div class="form-grid">

<input id="name" placeholder="Event Name">
<input id="type" placeholder="Event Type">
<input type="date" id="date">
<input type="time" id="time">
<input id="venue" placeholder="Venue">
<input id="image" placeholder="Image URL">
<input id="single" placeholder="Single Price">
<input id="double" placeholder="Double Price">
<input id="vip" placeholder="VIP Price">

<div class="full-width">
<textarea id="description" placeholder="Description"></textarea>
</div>

</div>

<div class="button-group">

<button id="saveBtn" class="save-btn" onclick="saveEvent()">
Save Event
</button>

<button class="clear-btn" onclick="clearForm()">
Clear
</button>

</div>
</div>

<div class="card">

<h2>Events List</h2>

<input type="text" id="search" class="search-box"
placeholder="Search events..." onkeyup="filterEvents()">

<table>

<thead>
<tr>
<th>Poster</th>
<th>Name</th>
<th>Type</th>
<th>Date</th>
<th>Time</th>
<th>Venue</th>
<th>Status</th>
<th>Single</th>
<th>Double</th>
<th>VIP</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="eventsTable"></tbody>

</table>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx9jrIHnZDQPkIeA6BTAyfzSKqipCaMddiJ3ZvDfxXtkldiH-k0PY1NkEVtGzylJlHl8A/exec";

let editingRow = null;
let allEvents = [];

/* ---------------- CLEAR FORM ---------------- */
function clearForm(){

document.getElementById("name").value="";
document.getElementById("type").value="";
document.getElementById("date").value="";
document.getElementById("time").value="";
document.getElementById("venue").value="";
document.getElementById("image").value="";
document.getElementById("description").value="";
document.getElementById("single").value="";
document.getElementById("double").value="";
document.getElementById("vip").value="";

editingRow = null;
document.getElementById("saveBtn").innerText = "Save Event";
}

/* ---------------- SAVE EVENT (FIXED) ---------------- */
function saveEvent(){

const data = {
action: editingRow ? "update" : "add",
row: editingRow,

name: document.getElementById("name").value,
type: document.getElementById("type").value,
date: document.getElementById("date").value,
time: document.getElementById("time").value,
venue: document.getElementById("venue").value,
image: document.getElementById("image").value,
description: document.getElementById("description").value,
single: document.getElementById("single").value,
double: document.getElementById("double").value,
vip: document.getElementById("vip").value

};

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(()=>{

alert(editingRow ? "Event Updated Successfully" : "Event Saved Successfully");

clearForm();
loadEvents();

});
}

/* ---------------- STATUS ---------------- */
function getStatus(dateString){

const today = new Date();
today.setHours(0,0,0,0);

const eventDate = new Date(dateString);

if(eventDate >= today){
return `<span class="status upcoming">Upcoming</span>`;
}

return `<span class="status ended">Ended</span>`;
}

/* ---------------- LOAD EVENTS ---------------- */
function loadEvents(){

fetch(SCRIPT_URL + "?action=get")
.then(r=>r.json())
.then(data=>{
allEvents = data;
renderEvents(data);
});
}

/* ---------------- RENDER ---------------- */
function renderEvents(data){

let html = "";

data.forEach((event,index)=>{

html += `
<tr>

<td>
<img class="event-image"
src="${event.image}"
onerror="this.src='https://via.placeholder.com/80x50'">
</td>

<td>${event.name}</td>
<td>${event.type}</td>
<td>${event.date}</td>
<td>${event.time}</td>
<td>${event.venue}</td>

<td>${getStatus(event.date)}</td>

<td>K${event.single}</td>
<td>K${event.double}</td>
<td>K${event.vip}</td>

<td>
<div class="actions">

<button class="edit-btn"
onclick='editEvent(${JSON.stringify(event)},${index+2})'>
Edit
</button>

<button class="delete-btn"
onclick='deleteEvent(${index+2})'>
Delete
</button>

</div>
</td>

</tr>
`;

});

document.getElementById("eventsTable").innerHTML = html;
}

/* ---------------- EDIT (FIXED) ---------------- */
function editEvent(event,row){

editingRow = row;

document.getElementById("name").value = event.name;
document.getElementById("type").value = event.type;
document.getElementById("date").value = event.date;
document.getElementById("time").value = event.time;
document.getElementById("venue").value = event.venue;
document.getElementById("image").value = event.image;
document.getElementById("description").value = event.description;
document.getElementById("single").value = event.single;
document.getElementById("double").value = event.double;
document.getElementById("vip").value = event.vip;

document.getElementById("saveBtn").innerText = "Update Event";

window.scrollTo({ top:0, behavior:"smooth" });
}

/* ---------------- DELETE ---------------- */
function deleteEvent(row){

if(!confirm("Are you sure you want to delete this event?")) return;

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"delete",
row:row
})
})
.then(r=>r.json())
.then(()=>{
alert("Event Deleted");
loadEvents();
});
}

/* ---------------- FILTER ---------------- */
function filterEvents(){

const search = document.getElementById("search").value.toLowerCase();

const filtered = allEvents.filter(event =>
event.name.toLowerCase().includes(search) ||
event.type.toLowerCase().includes(search) ||
event.venue.toLowerCase().includes(search)
);

renderEvents(filtered);
}

/* ---------------- INIT ---------------- */
loadEvents();

</script>

</body>
</html>
