<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOL I.T SYSTEM</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#111827;
color:white;
min-height:100vh;
}

header{
padding:30px;
background:#000;
text-align:center;
}

header h1{
font-size:38px;
margin-bottom:10px;
}

header p{
color:#ccc;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card{
background:#1f2937;
padding:30px;
border-radius:20px;
text-align:center;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

.card h2{
margin-bottom:15px;
}

.card p{
color:#bbb;
margin-bottom:20px;
}

.btn{
display:inline-block;
padding:15px 25px;
background:#f59e0b;
color:black;
font-weight:bold;
text-decoration:none;
border-radius:10px;
}

.stats{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
margin-bottom:40px;
}

.stat{
background:#1f2937;
padding:25px;
border-radius:15px;
text-align:center;
}

.number{
font-size:40px;
font-weight:bold;
margin-bottom:10px;
}

@media(max-width:768px){
.stats{
grid-template-columns:1fr;
}
}

</style>
</head>
<body>

<header>
<h1>NIGHT OF LAUGHTER</h1>
<p>I.T MANAGEMENT SYSTEM</p>
</header>

<div class="container">

<div class="stats">

<div class="stat">
<div class="number">📅</div>
<div>Manage Events</div>
</div>

<div class="stat">
<div class="number">🎟️</div>
<div>Generate Tickets</div>
</div>

<div class="stat">
<div class="number">📲</div>
<div>Scan Tickets</div>
</div>

</div>

<div class="cards">

<div class="card">
<h2>Events Management</h2>
<p>Create, update and delete events.</p>
<a href="events.html" class="btn">OPEN</a>
</div>

<div class="card">
<h2>Ticket Generator</h2>
<p>Generate QR event tickets.</p>
<a href="ticket-generator.html" class="btn">OPEN</a>
</div>

<div class="card">
<h2>Ticket Scanner</h2>
<p>Validate tickets at entry.</p>
<a href="ticket-scanner.html" class="btn">OPEN</a>
</div>

</div>

</div>

</body>
</html>
