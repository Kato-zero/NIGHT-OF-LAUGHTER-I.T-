<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOL I.T SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}

body{
background:#0b1220;
color:#e5e7eb;
min-height:100vh;
}

/* LOGIN */
.login-screen{
display:flex;
align-items:center;
justify-content:center;
min-height:100vh;
padding:20px;
}

.login-card{
max-width:420px;
width:100%;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
border-radius:20px;
padding:40px;
}

input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:1px solid rgba(255,255,255,0.2);
background:rgba(0,0,0,0.3);
color:white;
}

button{
cursor:pointer;
}

.login-btn{
width:100%;
margin-top:15px;
padding:14px;
background:#f59e0b;
border:none;
border-radius:10px;
font-weight:700;
}

.error{color:red;margin-top:10px;display:none;}

/* DASHBOARD */
.dashboard{display:none;padding:20px;}

header{
text-align:center;
padding:20px;
position:relative;
}

.logout{
position:absolute;
right:10px;
top:10px;
padding:10px;
background:#ef4444;
border:none;
border-radius:8px;
color:white;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
margin-top:20px;
}

.card{
background:rgba(255,255,255,0.06);
padding:20px;
border-radius:15px;
text-align:center;
}

.btn{
display:inline-block;
margin-top:10px;
padding:10px 15px;
background:#f59e0b;
border-radius:10px;
color:black;
text-decoration:none;
font-weight:700;
}

.install{
position:fixed;
bottom:20px;
left:20px;
padding:12px 15px;
background:#f59e0b;
border:none;
border-radius:10px;
display:none;
font-weight:700;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-screen" id="loginScreen">
<div class="login-card">
<h2>NOL SYSTEM</h2>

<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">

<button class="login-btn" onclick="login()">Login</button>
<div class="error" id="error">Invalid login</div>
</div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard">

<header>
<h2>NIGHT OF LAUGHTER</h2>
<button class="logout" onclick="logout()">Logout</button>

<button id="installBtn" class="install">Install App</button>
</header>

<div class="cards">
<div class="card">
<h3>Events</h3>
<a class="btn" href="events.html">Open</a>
</div>

<div class="card">
<h3>Tickets</h3>
<a class="btn" href="ticket-generator.html">Open</a>
</div>

<div class="card">
<h3>Scanner</h3>
<a class="btn" href="ticket-scanner.html">Open</a>
</div>
</div>

</div>

<script>
const USER="Admin26";
const PASS="noL2026";

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("password").value;

if(u===USER && p===PASS){
localStorage.setItem("auth","1");
showDash();
}else{
document.getElementById("error").style.display="block";
}
}

function logout(){
localStorage.removeItem("auth");
showLogin();
}

function showDash(){
document.getElementById("loginScreen").style.display="none";
document.getElementById("dashboard").style.display="block";
}

function showLogin(){
document.getElementById("loginScreen").style.display="flex";
document.getElementById("dashboard").style.display="none";
}

if(localStorage.getItem("auth")==="1") showDash(); else showLogin();

/* INSTALL PWA */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
e.preventDefault();
deferredPrompt=e;
document.getElementById("installBtn").style.display="block";
});

document.getElementById("installBtn").addEventListener("click", async ()=>{
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt=null;
document.getElementById("installBtn").style.display="none";
});

/* SW */
if("serviceWorker" in navigator){
window.addEventListener("load", ()=>{
navigator.serviceWorker.register("service-worker.js");
});
}
</script>

</body>
</html>
