<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOL Events</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f5f5;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

.card{
background:white;
padding:25px;
border-radius:15px;
margin-bottom:20px;
}

input,
textarea,
select{
width:100%;
padding:12px;
margin-top:8px;
margin-bottom:15px;
border:1px solid #ddd;
border-radius:8px;
}

button{
padding:12px 20px;
border:none;
background:#111;
color:white;
border-radius:8px;
cursor:pointer;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
padding:12px;
border:1px solid #ddd;
}

.actions button{
margin-right:5px;
}

</style>
</head>
<body>

<div class="container">

<a href="index.html">← Dashboard</a>

<div class="card">

<h2>Add Event</h2>

<input id="name" placeholder="Event Name">

<input id="type" placeholder="Event Type">

<input type="date" id="date">

<input type="time" id="time">

<input id="venue" placeholder="Venue">

<input id="image" placeholder="Image URL">

<textarea id="description"
placeholder="Description"></textarea>

<input id="single" placeholder="Single Price">

<input id="double" placeholder="Double Price">

<input id="vip" placeholder="VIP Price">

<button onclick="saveEvent()">
Save Event
</button>

</div>

<div class="card">

<h2>Events</h2>

<table>

<thead>
<tr>
<th>Name</th>
<th>Type</th>
<th>Date</th>
<th>Venue</th>
<th>Actions</th>
</tr>
</thead>

<tbody id="eventsTable"></tbody>

</table>

</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbx9jrIHnZDQPkIeA6BTAyfzSKqipCaMddiJ3ZvDfxXtkldiH-k0PY1NkEVtGzylJlHl8A/exec";

function saveEvent(){

const data = {

action:"add",

name:name.value,
type:type.value,
date:date.value,
time:time.value,
venue:venue.value,
image:image.value,
description:description.value,
single:single.value,
double:double.value,
vip:vip.value

};

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify(data)
})
.then(r=>r.json())
.then(loadEvents);

}

function loadEvents(){

fetch(SCRIPT_URL+"?action=get")
.then(r=>r.json())
.then(data=>{

let html="";

data.forEach((event,index)=>{

html += `
<tr>
<td>${event.name}</td>
<td>${event.type}</td>
<td>${event.date}</td>
<td>${event.venue}</td>

<td class="actions">

<button onclick="deleteEvent(${index})">
Delete
</button>

</td>

</tr>
`;

});

eventsTable.innerHTML = html;

});

}

function deleteEvent(index){

fetch(SCRIPT_URL,{
method:"POST",
body:JSON.stringify({
action:"delete",
row:index+2
})
})
.then(r=>r.json())
.then(loadEvents);

}

loadEvents();

</script>

</body>
</html>
