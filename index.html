<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NOL I.T SYSTEM</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b1220">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;
}

body{
background:#0b1220;
color:#e5e7eb;
min-height:100vh;
}

/* HEADER */
header{
text-align:center;
padding:25px;
position:relative;
border-bottom:1px solid rgba(255,255,255,0.1);
}

header h1{
font-size:26px;
}

header p{
color:#9ca3af;
font-size:13px;
margin-top:5px;
}

/* INSTALL BUTTON */
.install{
position:absolute;
right:15px;
top:15px;
padding:10px 12px;
background:#f59e0b;
border:none;
border-radius:10px;
font-weight:700;
display:none;
cursor:pointer;
}

/* CONTAINER */
.container{
padding:30px 20px;
max-width:1100px;
margin:auto;
}

/* CARDS */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
margin-top:30px;
}

.card{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
padding:25px;
border-radius:18px;
text-align:center;
transition:0.2s;
}

.card:hover{
transform:translateY(-5px);
}

.btn{
display:inline-block;
margin-top:12px;
padding:10px 15px;
background:#f59e0b;
color:black;
border-radius:10px;
font-weight:700;
text-decoration:none;
}

</style>
</head>

<body>

<header>
<h1>NIGHT OF LAUGHTER</h1>
<p>IT Management System</p>

<button id="installBtn" class="install">Install App</button>
</header>

<div class="container">

<div class="cards">

<div class="card">
<h2>Events Management</h2>
<p>Create and manage events</p>
<a class="btn" href="events.html">Open</a>
</div>

<div class="card">
<h2>Ticket Generator</h2>
<p>Create QR tickets instantly</p>
<a class="btn" href="ticket-generator.html">Open</a>
</div>

<div class="card">
<h2>Ticket Scanner</h2>
<p>Validate entry tickets</p>
<a class="btn" href="ticket-scanner.html">Open</a>
</div>

</div>

</div>

<script>

/* PWA INSTALL */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e)=>{
e.preventDefault();
deferredPrompt = e;
document.getElementById("installBtn").style.display = "block";
});

document.getElementById("installBtn").addEventListener("click", async ()=>{
deferredPrompt.prompt();
await deferredPrompt.userChoice;
deferredPrompt = null;
document.getElementById("installBtn").style.display = "none";
});

/* SERVICE WORKER */
if("serviceWorker" in navigator){
window.addEventListener("load", ()=>{
navigator.serviceWorker.register("service-worker.js");
});
}

</script>

</body>
</html>
